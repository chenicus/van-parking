<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Van Parking</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sheet: #ffffff; --map-cover: #fff; --text: #202124; --muted: #5f6368;
    --line: #e8eaed; --chip: #f1f3f4; --accent: #1a73e8; --on-accent: #fff;
    --green: #188038; --sel: #1e8e3e; --shadow: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --sheet: #202124; --map-cover: #202124; --text: #e8eaed; --muted: #9aa0a6;
      --line: #3c4043; --chip: #303134; --accent: #8ab4f8; --on-accent: #202124;
      --green: #81c995; --sel: #81c995; --shadow: 0 1px 3px rgba(0,0,0,.5), 0 4px 8px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: Roboto, system-ui, sans-serif; color: var(--text); background: var(--map-cover); }
  #map { position: absolute; inset: 0; z-index: 1; }
  .leaflet-control-attribution { font-size: 9px; }

  .searchbar { position: absolute; z-index: 500; top: calc(env(safe-area-inset-top, 0px) + 12px);
    left: 12px; right: 12px; height: 50px; background: var(--sheet); border-radius: 28px;
    box-shadow: var(--shadow); display: flex; align-items: center; padding: 0 8px 0 16px; gap: 10px; }
  .searchbar .mi { font-size: 20px; flex: none; }
  .searchbar input { flex: 1; border: none; background: none; color: var(--text);
    font-size: 16px; font-family: inherit; outline: none; height: 100%; }
  .searchbar input::placeholder { color: var(--muted); }
  .iconbtn { width: 38px; height: 38px; border-radius: 50%; border: none; background: none;
    color: var(--accent); font-size: 21px; display: grid; place-items: center; cursor: pointer; }
  .iconbtn:active { background: var(--chip); }

  .sheet { position: absolute; z-index: 500; left: 0; right: 0; bottom: 0; height: 44vh;
    background: var(--sheet); border-radius: 16px 16px 0 0; box-shadow: var(--shadow);
    display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom, 0px); }
  .grip { padding: 10px 0 6px; flex: none; cursor: grab; touch-action: none; }
  .grip:active { cursor: grabbing; }
  .handle { width: 40px; height: 5px; border-radius: 3px; background: var(--line); margin: 0 auto; }
  .trip { padding: 6px 16px 14px; border-bottom: 1px solid var(--line); flex: none; }
  .slider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .sld-lab { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .sld-lab span { color: var(--text); font-weight: 500; }
  input[type=range] { width: 100%; accent-color: var(--accent); }

  #results { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
  .status { padding: 20px 16px; color: var(--muted); font-size: 14px; text-align: center; }
  .card { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    border-bottom: 1px solid var(--line); cursor: pointer; }
  .card:active, .card.sel { background: var(--chip); }
  .num { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: var(--on-accent);
    display: grid; place-items: center; font-size: 13px; font-weight: 500; flex: none; }
  .num.dim { background: var(--chip); color: var(--muted); }
  .card .body { flex: 1; min-width: 0; }
  .card .price { font-size: 16px; font-weight: 500; }
  .card .price.free { color: var(--green); }
  .card .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .tags { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--chip); color: var(--muted); }
  .tag.free { background: rgba(24,128,56,.14); color: var(--green); }
  .dir { flex: none; display: grid; place-items: center; text-align: center; }
  .dir .btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent);
    display: grid; place-items: center; }
  .dir .btn svg { width: 20px; height: 20px; fill: var(--on-accent); }
  .dir .t { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .pin { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: var(--on-accent);
    display: grid; place-items: center; font-size: 14px; font-weight: 500; border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.45); }
  .pin.sel { background: var(--sel); transform: scale(1.18); }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #9aa0a6; border: 2px solid #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.35); }
  .dot.sel { background: var(--sel); }
  .destpin { width: 20px; height: 20px; border-radius: 50%; background: #ea4335;
    border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.5); }

  @media (min-width: 760px) {
    .searchbar { width: 400px; right: auto; }
    .sheet { width: 400px; right: auto; top: 74px; bottom: 16px; height: auto; border-radius: 16px; }
    .grip { cursor: default; }
  }
</style>

<div id="map"></div>

<form class="searchbar" id="searchform">
  <span class="mi">📍</span>
  <input id="dest" type="search" enterkeyhint="search" autocomplete="off" placeholder="Search a destination" />
  <button class="iconbtn" id="here" type="button" aria-label="Use my location">◎</button>
</form>

<div class="sheet" id="sheet">
  <div class="grip" id="grip"><div class="handle"></div></div>
  <div class="trip">
    <div class="slider-grid">
      <div class="sld">
        <div class="sld-lab">Park <span id="durval">2h</span></div>
        <input id="dur" type="range" min="0.5" max="8" step="0.5" value="2" />
      </div>
      <div class="sld">
        <div class="sld-lab">Walk ≤ <span id="walkval">8</span> min</div>
        <input id="walk" type="range" min="1" max="20" value="8" />
      </div>
    </div>
  </div>
  <div id="results"><div class="status">Search a destination to see parking near it.</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="app.js?v=8"></script>
